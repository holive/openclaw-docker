#cloud-config
package_update: true
package_upgrade: true

packages:
  - ca-certificates
  - curl
  - gnupg
  - git
  - ufw
  - make

write_files:
  - path: /root/setup.sh
    permissions: '0755'
    content: |
      #!/bin/bash
      set -euo pipefail

      STATUS_FILE="/var/log/openclaw-bootstrap.status"
      PHASE="init"

      mark() {
        echo "$(date -Is) $1" | tee -a "$STATUS_FILE"
      }

      fail_with() {
        local code="$1"
        local reason="$2"
        mark "FINAL=failed PHASE=$${PHASE} ERROR=$${reason} EXIT_CODE=$${code}"
        exit "$code"
      }

      trap 'code=$?; mark "FINAL=failed PHASE=$${PHASE} ERROR=unexpected EXIT_CODE=$${code}"' ERR

      : > "$STATUS_FILE"
      mark "FINAL=running PHASE=$${PHASE}"
      echo "starting openclaw setup..."

      # install docker
      PHASE="docker_install"
      mark "PHASE=$${PHASE} RESULT=running"
      echo "installing docker..."
      curl -fsSL https://get.docker.com | sh
      systemctl enable docker
      systemctl start docker
      mark "PHASE=$${PHASE} RESULT=ok"

      # install tailscale
      PHASE="tailscale_install"
      mark "PHASE=$${PHASE} RESULT=running"
      echo "installing tailscale..."
      curl -fsSL https://tailscale.com/install.sh | sh
      mark "PHASE=$${PHASE} RESULT=ok"

      PHASE="tailscale_auth"
      mark "PHASE=$${PHASE} RESULT=running"
      if ! tailscale up --authkey="${tailscale_authkey}" --hostname="${server_name}"; then
        fail_with 21 "tailscale_auth_failed"
      fi
      TAILSCALE_IP="$(tailscale ip -4 | head -n1 || true)"
      if [ -z "$TAILSCALE_IP" ]; then
        fail_with 22 "tailscale_no_ipv4"
      fi
      mark "PHASE=$${PHASE} RESULT=ok TAILSCALE_IP=$${TAILSCALE_IP}"

      # harden ssh (key-only auth, disable password login)
      PHASE="ssh_hardening"
      mark "PHASE=$${PHASE} RESULT=running"
      echo "hardening ssh..."
      mkdir -p /etc/ssh/sshd_config.d
      cat > /etc/ssh/sshd_config.d/99-hardening.conf << 'SSHCONF'
      PasswordAuthentication no
      KbdInteractiveAuthentication no
      ChallengeResponseAuthentication no
      PermitRootLogin prohibit-password
      PubkeyAuthentication yes
      SSHCONF
      sshd -t
      systemctl reload ssh
      mark "PHASE=$${PHASE} RESULT=ok"

      # configure firewall
      PHASE="firewall"
      mark "PHASE=$${PHASE} RESULT=running"
      echo "configuring firewall..."
      ufw default deny incoming
      ufw default allow outgoing
      ufw allow ssh
      ufw allow in on tailscale0 to any port 18789 proto tcp
      echo "y" | ufw enable
      mark "PHASE=$${PHASE} RESULT=ok"

      # clone and setup openclaw
      PHASE="repo_clone"
      mark "PHASE=$${PHASE} RESULT=running"
      echo "cloning openclaw-docker..."
      if [ -d "/opt/openclaw-docker/.git" ]; then
        echo "repo already exists (skipping clone)"
      else
        git clone https://github.com/holive/openclaw-docker.git /opt/openclaw-docker
      fi
      cd /opt/openclaw-docker
      mark "PHASE=$${PHASE} RESULT=ok"

      # generate .env
      PHASE="env_prepare"
      mark "PHASE=$${PHASE} RESULT=running"
      if [ ! -f .env ]; then
        cp .env.example .env
      fi
      if grep -qE "^\s*OPENCLAW_GATEWAY_TOKEN=\s*$" .env; then
        TOKEN=$(openssl rand -hex 32)
        sed -i "s/^OPENCLAW_GATEWAY_TOKEN=$/OPENCLAW_GATEWAY_TOKEN=$TOKEN/" .env
      fi
      # bind to tailscale ip for remote access
      if grep -q "^OPENCLAW_BIND_IP=" .env; then
        sed -i "s/^OPENCLAW_BIND_IP=.*/OPENCLAW_BIND_IP=$TAILSCALE_IP/" .env
      else
        echo "OPENCLAW_BIND_IP=$TAILSCALE_IP" >> .env
      fi
      chmod 600 .env
      mark "PHASE=$${PHASE} RESULT=ok"

      # setup and start
      PHASE="openclaw_setup"
      mark "PHASE=$${PHASE} RESULT=running"
      echo "running make setup..."
      make setup
      mark "PHASE=$${PHASE} RESULT=ok"

      PHASE="gateway_start"
      mark "PHASE=$${PHASE} RESULT=running"
      echo "starting gateway..."
      make up

      # wait for healthy
      echo "waiting for gateway to be ready..."
      READY=0
      for i in {1..30}; do
        if docker compose ps --format json 2>/dev/null | grep -q '"Health":"healthy"'; then
          READY=1
          echo "gateway is healthy"
          break
        fi
        if docker compose exec -T openclaw-gateway node openclaw.mjs health >/dev/null 2>&1; then
          READY=1
          echo "gateway health command is ready"
          break
        fi
        sleep 2
      done
      if [ "$READY" -ne 1 ]; then
        fail_with 51 "gateway_not_ready"
      fi
      mark "PHASE=$${PHASE} RESULT=ok"

      # create systemd service for auto-restart on reboot
      PHASE="systemd_service"
      mark "PHASE=$${PHASE} RESULT=running"
      cat > /etc/systemd/system/openclaw.service << 'SYSTEMD'
      [Unit]
      Description=OpenClaw Gateway
      Requires=docker.service
      After=docker.service tailscaled.service

      [Service]
      Type=oneshot
      RemainAfterExit=yes
      WorkingDirectory=/opt/openclaw-docker
      ExecStart=/usr/bin/docker compose up -d
      ExecStop=/usr/bin/docker compose down
      TimeoutStartSec=0

      [Install]
      WantedBy=multi-user.target
      SYSTEMD

      systemctl daemon-reload
      systemctl enable openclaw.service
      mark "PHASE=$${PHASE} RESULT=ok"

      PHASE="complete"
      echo "setup complete"
      echo "tailscale ip: $TAILSCALE_IP"
      mark "FINAL=success PHASE=$${PHASE} TAILSCALE_IP=$${TAILSCALE_IP}"

runcmd:
  - /root/setup.sh > /var/log/openclaw-setup.log 2>&1
