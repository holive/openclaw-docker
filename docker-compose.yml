services:
  openclaw-gateway:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        EXTRA_APT_PACKAGES: ${EXTRA_APT_PACKAGES:-}
        OPENCLAW_BROWSER: ${OPENCLAW_BROWSER:-false}
    container_name: openclaw
    environment:
      HOME: /home/node
      TERM: xterm-256color
      # gateway config
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      OPENCLAW_GATEWAY_PORT: ${OPENCLAW_GATEWAY_PORT:-18789}
      OPENCLAW_GATEWAY_BIND: ${OPENCLAW_GATEWAY_BIND:-lan}
      # api keys
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      XAI_API_KEY: ${XAI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      MINIMAX_API_KEY: ${MINIMAX_API_KEY:-}
      MOONSHOT_API_KEY: ${MOONSHOT_API_KEY:-}
      KIMI_API_KEY: ${KIMI_API_KEY:-}
      VOLCANO_ENGINE_API_KEY: ${VOLCANO_ENGINE_API_KEY:-}
      # search/tool apis
      BRAVE_API_KEY: ${BRAVE_API_KEY:-}
      PERPLEXITY_API_KEY: ${PERPLEXITY_API_KEY:-}
      # channels
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN:-}
      SLACK_APP_TOKEN: ${SLACK_APP_TOKEN:-}
      MATTERMOST_BOT_TOKEN: ${MATTERMOST_BOT_TOKEN:-}
      MATTERMOST_URL: ${MATTERMOST_URL:-}
      # bind ip (for origins auto-config)
      OPENCLAW_BIND_IP: ${OPENCLAW_BIND_IP:-}
      # browser
      BROWSER: echo
    env_file:
      - path: .env
        required: false
    volumes:
      - openclaw-home:/home/node
      - ./data:/home/node/.openclaw
      - ./workspaces/${OPENCLAW_WORKSPACE:-default}:/home/node/.openclaw/workspace
    ports:
      - "${OPENCLAW_BIND_IP:-127.0.0.1}:${OPENCLAW_GATEWAY_PORT:-18789}:18789"
    init: true
    restart: unless-stopped
    # security hardening
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=64M,mode=1777
    deploy:
      resources:
        limits:
          memory: ${OPENCLAW_MEMORY_LIMIT:-1536m}
          pids: 256
    healthcheck:
      # dist/index.js is 3x faster than openclaw.mjs for cold-start probes
      test: ["CMD", "node", "dist/index.js", "health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  openclaw-cli:
    build:
      context: .
      dockerfile: Dockerfile
    profiles: ["cli"]
    environment:
      HOME: /home/node
      TERM: xterm-256color
      BROWSER: echo
    env_file:
      - path: .env
        required: false
    volumes:
      - openclaw-home:/home/node
      - ./data:/home/node/.openclaw
      - ./workspaces/${OPENCLAW_WORKSPACE:-default}:/home/node/.openclaw/workspace
    stdin_open: true
    tty: true
    init: true
    entrypoint: ["node", "openclaw.mjs"]

volumes:
  openclaw-home:
